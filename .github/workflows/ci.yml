name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGO_TEST_URI: mongodb://127.0.0.1:27017/agenda_ci_test
      SESSION_SECRET: ci-only-session-secret-not-for-production
      FRONTEND_URL: http://localhost:4321
      BACKEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:4321
      GOOGLE_CLIENT_ID: ci-google-client-id
    defaults:
      run:
        working-directory: Server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  frontend:
    name: Frontend checks and build
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: 1
      PUBLIC_API_URL: http://localhost:3000/api
    defaults:
      run:
        working-directory: Client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Astro and TypeScript checks
        run: npm run check

      - name: Build production frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Scan tracked files with Gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.24.2
        with:
          args: detect --source=/github/workspace --no-git --redact --no-banner --verbose
